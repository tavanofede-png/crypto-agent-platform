version: "3.9"

# ─────────────────────────────────────────────────────────────
#  Production Docker Compose
#  Usage:  docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:
  # ─── Infrastructure ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cap_postgres
    <<: *default-restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: cap_redis
    <<: *default-restart
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Application Services ─────────────────────────────────
  runtime:
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER}/cap-runtime:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/runtime/Dockerfile
    container_name: cap_runtime
    <<: *default-restart
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RUNTIME_PORT: 3002
      WORKSPACE_BASE: /workspaces
      NODE_ENV: production
    volumes:
      - agent_workspaces:/workspaces
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  api:
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER}/cap-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cap_api
    <<: *default-restart
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RUNTIME_URL: http://runtime:3002
      FRONTEND_URL: https://${DOMAIN}
      PORT: 3001
      NODE_ENV: production
      TREASURY_ADDRESS: ${TREASURY_ADDRESS}
      AGENT_CREATION_PRICE: ${AGENT_CREATION_PRICE:-0.005}
      AGENT_CREATION_CHAIN_ID: ${AGENT_CREATION_CHAIN_ID:-11155111}
      AGENT_CREATION_TOKEN_ADDRESS: ${AGENT_CREATION_TOKEN_ADDRESS:-}
      AGENT_CREATION_TOKEN_SYMBOL: ${AGENT_CREATION_TOKEN_SYMBOL:-ETH}
      AGENT_CREATION_TOKEN_DECIMALS: ${AGENT_CREATION_TOKEN_DECIMALS:-18}
      PAYMENT_SESSION_TTL_MINUTES: ${PAYMENT_SESSION_TTL_MINUTES:-15}
      ACTIVE_CHAINS: ${ACTIVE_CHAINS:-11155111}
      CHAIN_11155111_RPC_URL: ${CHAIN_11155111_RPC_URL}
      REQUIRED_CONFIRMATIONS_DEFAULT: ${REQUIRED_CONFIRMATIONS_DEFAULT:-2}
      REQUIRED_CONFIRMATIONS_11155111: ${REQUIRED_CONFIRMATIONS_11155111:-1}
      CHAIN_11155111_TOKENS: ${CHAIN_11155111_TOKENS:-}
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 60
    networks:
      - internal
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/auth/nonce/0x0000000000000000000000000000000000000000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  worker:
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER}/cap-worker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: cap_worker
    <<: *default-restart
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RUNTIME_URL: http://runtime:3002
      NODE_ENV: production
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runtime:
        condition: service_healthy
    logging: *default-logging

  web:
    image: ${REGISTRY:-ghcr.io}/${REPO_OWNER}/cap-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
        NEXT_PUBLIC_WS_URL: https://${DOMAIN}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-1}
    container_name: cap_web
    <<: *default-restart
    environment:
      PORT: 3000
      NODE_ENV: production
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ─── Nginx reverse proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cap_nginx
    <<: *default-restart
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks:
      - proxy
    depends_on:
      - api
      - web
    logging: *default-logging

  # ─── Certbot (SSL) ────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: cap_certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  agent_workspaces:
  certbot_webroot:
  certbot_certs:
  nginx_logs:

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    driver: bridge
