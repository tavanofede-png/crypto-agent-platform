# Copiar a railway.toml al desplegar el servicio api desde CLI:
#   cp infra/railway/railway.api.toml railway.toml
#   railway service link api && railway up

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
