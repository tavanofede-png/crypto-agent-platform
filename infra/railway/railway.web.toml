# Copiar a la raíz del repo como railway.toml solo al desplegar el servicio web:
#   cp infra/railway/railway.web.toml railway.toml
#   railway service link web && railway up
# Luego restaurar: cp infra/railway/railway.api.toml railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
