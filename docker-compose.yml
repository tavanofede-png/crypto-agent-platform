version: "3.9"

services:
  # ─── Infrastructure ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_agents}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cap_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ────────────────────────────────
  runtime:
    build:
      context: .
      dockerfile: apps/runtime/Dockerfile
    container_name: cap_runtime
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RUNTIME_PORT: 3002
      WORKSPACE_BASE: /workspaces
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3002:3002"
    volumes:
      - agent_workspaces:/workspaces

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cap_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-crypto_agents}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtchangeme}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RUNTIME_URL: http://runtime:3002
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-60}
      # ─── Blockchain payment detection ─────────────────────
      TREASURY_ADDRESS: ${TREASURY_ADDRESS}
      AGENT_CREATION_PRICE: ${AGENT_CREATION_PRICE:-0.005}
      AGENT_CREATION_CHAIN_ID: ${AGENT_CREATION_CHAIN_ID:-11155111}
      AGENT_CREATION_TOKEN_ADDRESS: ${AGENT_CREATION_TOKEN_ADDRESS:-}
      AGENT_CREATION_TOKEN_SYMBOL: ${AGENT_CREATION_TOKEN_SYMBOL:-ETH}
      AGENT_CREATION_TOKEN_DECIMALS: ${AGENT_CREATION_TOKEN_DECIMALS:-18}
      PAYMENT_SESSION_TTL_MINUTES: ${PAYMENT_SESSION_TTL_MINUTES:-15}
      ACTIVE_CHAINS: ${ACTIVE_CHAINS:-11155111}
      REQUIRED_CONFIRMATIONS_DEFAULT: ${REQUIRED_CONFIRMATIONS_DEFAULT:-2}
      REQUIRED_CONFIRMATIONS_1: ${REQUIRED_CONFIRMATIONS_1:-12}
      REQUIRED_CONFIRMATIONS_137: ${REQUIRED_CONFIRMATIONS_137:-64}
      REQUIRED_CONFIRMATIONS_42161: ${REQUIRED_CONFIRMATIONS_42161:-2}
      REQUIRED_CONFIRMATIONS_8453: ${REQUIRED_CONFIRMATIONS_8453:-2}
      REQUIRED_CONFIRMATIONS_11155111: ${REQUIRED_CONFIRMATIONS_11155111:-1}
      CHAIN_1_RPC_URL: ${CHAIN_1_RPC_URL}
      CHAIN_137_RPC_URL: ${CHAIN_137_RPC_URL}
      CHAIN_42161_RPC_URL: ${CHAIN_42161_RPC_URL}
      CHAIN_8453_RPC_URL: ${CHAIN_8453_RPC_URL}
      CHAIN_11155111_RPC_URL: ${CHAIN_11155111_RPC_URL}
      CHAIN_80002_RPC_URL: ${CHAIN_80002_RPC_URL}
      CHAIN_1_TOKENS: ${CHAIN_1_TOKENS}
      CHAIN_137_TOKENS: ${CHAIN_137_TOKENS}
      CHAIN_42161_TOKENS: ${CHAIN_42161_TOKENS}
      CHAIN_8453_TOKENS: ${CHAIN_8453_TOKENS}
      CHAIN_11155111_TOKENS: ${CHAIN_11155111_TOKENS}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runtime:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: cap_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-crypto_agents}
      REDIS_URL: redis://redis:6379
      RUNTIME_URL: http://runtime:3002
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runtime:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-11155111}
    container_name: cap_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  agent_workspaces:
