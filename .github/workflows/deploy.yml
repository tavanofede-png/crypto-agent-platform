name: Build → Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy"
        default: "latest"

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app: [api, worker, runtime, web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/cap-${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN }}
            NEXT_PUBLIC_WS_URL=https://${{ secrets.DOMAIN }}
            NEXT_PUBLIC_CHAIN_ID=1

  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export IMAGE_TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)
            bash /opt/cap/infra/deploy.sh "$IMAGE_TAG"

      - name: Smoke test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.DOMAIN }}/health)
          if [[ "$STATUS" != "200" ]]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Health check passed (HTTP $STATUS)"
